<app-header [cantidadInicial]="cantidadActual"></app-header>

<section class="dashboard">
  <header class="dashboard__header">
    <h1 class="dashboard__title">Fondos</h1>
    <p class="dashboard__subtitle">
      Listado de fondos disponibles: identificador, nombre, monto mínimo y categoría.
    </p>
  </header>
  <app-tabla-lista-fondos (onSuscripcionConfirmada)="onSuscripcionConfirmada($event)"
                          [fondos]="fondos"
  />
</section>

<section class="dashboard">
  <header class="historial__header">
    <h1 class="historial__title">Historial de transacciones</h1>
    <p class="historial__subtitle">Suscripciones realizadas.</p>
  </header>
  <app-tabla-lista-transacciones  [transacciones]="transacciones" (eliminarSuscripciones)="onEliminarSuscripcion($event)" />
</section>
<p-toast />
