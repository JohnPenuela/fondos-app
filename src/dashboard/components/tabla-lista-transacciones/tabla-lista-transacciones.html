<div class="tabla-transacciones card-like">
  <p-table
    [value]="transacciones"
    [sortMode]="'single'"
    [tableStyle]="{ 'min-width': '56rem' }"
    styleClass="p-datatable-striped"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 25]"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} transacciones"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id" style="width: 6rem">
          <span class="th-label">ID</span>
          <p-sortIcon field="id"></p-sortIcon>
        </th>
        <th pSortableColumn="nombre">
          <span class="th-label">Nombre</span>
          <p-sortIcon field="nombre"></p-sortIcon>
        </th>
        <th pSortableColumn="monto" style="width: 12rem">
          <span class="th-label">Monto</span>
          <p-sortIcon field="monto"></p-sortIcon>
        </th>
        <th pSortableColumn="fecha" style="width: 15rem">
          <span class="th-label">Fecha</span>
          <p-sortIcon field="fecha"></p-sortIcon>
        </th>
        <th style="width: 11rem" class="th-acciones">
          <span class="th-label">Acción</span>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-transaccion>
      <tr>
        <td>{{ transaccion.id }}</td>
        <td class="cell-nombre">{{ transaccion.nombre }}</td>
        <td>{{ transaccion.monto | currency:'COP':'symbol-narrow':'1.0-0':'es-CO' }}</td>
        <td>{{ transaccion.fecha }}</td>
        <td class="cell-acciones">
          <p-button
            icon="pi pi-trash"
            size="small"
            (click)="eliminarSuscripciones.emit(transaccion)"
          />
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="5" class="empty-msg">No hay transacciones registradas.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
