<header class="app-header">
  <div class="app-header__inner">
    <a routerLink="/" class="app-header__brand">Fondos</a>

    <div class="app-header__saldo" title="Cantidad inicial en pesos colombianos (COP)">
      <span class="app-header__saldo-label">Cantidad inicial</span>
      <span class="app-header__saldo-value" aria-label="Cantidad en pesos colombianos">
        {{ cantidadInicial | currency:'COP':'symbol-narrow':'1.0-0':'es-CO' }}
      </span>
    </div>

    <nav class="app-header__nav" aria-label="Principal">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" class="app-header__link">
        Inicio
      </a>
      <a routerLink="/transacciones" routerLinkActive="is-active" class="app-header__link">
        Historial de transacciones
      </a>
    </nav>
  </div>
</header>
